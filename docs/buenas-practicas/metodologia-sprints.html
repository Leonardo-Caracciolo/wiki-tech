<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Metodología de Desarrollo — Equipo RPA</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#86BC25;--green-dk:#5a8a0a;--green-lt:#f0f7e0;
  --black:#0a0a0a;--surface:#141414;--card:#1c1c1c;
  --border:#2a2a2a;--border-lt:#333;
  --white:#ffffff;--muted:#888;--faint:#555;
  --blue:#3b82f6;--amber:#f59e0b;--teal:#14b8a6;
}
body{background:var(--black);font-family:'DM Sans',sans-serif;color:var(--white);min-height:100vh;display:flex;flex-direction:column;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:#111;}
::-webkit-scrollbar-thumb{background:#333;border-radius:2px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideIn{from{opacity:0;transform:translateX(16px);}to{opacity:1;transform:translateX(0);}}
.fade-up{animation:fadeUp .3s ease forwards;}
.slide-in{animation:slideIn .25s ease forwards;}

/* ── HEADER ── */
#header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:58px;flex-shrink:0;}
#header-title{display:flex;align-items:center;gap:14px;}
#header-bar{width:3px;height:32px;background:var(--green);border-radius:2px;}
#header-main{font-size:15px;font-weight:800;color:var(--white);font-family:'Syne',sans-serif;}
#header-sub{font-size:10px;color:var(--muted);margin-top:2px;}
#tabs{display:flex;gap:4px;}
.tab-btn{background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:6px 14px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.tab-btn.active{background:var(--green);color:#fff;border-color:var(--green);}

/* ── VIEWS ── */
#content{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.view{display:none;flex:1;overflow:hidden;}
.view.active{display:flex;flex-direction:column;}

/* ── TAB 0 GENERAL ── */
#general-layout{display:grid;grid-template-columns:420px 1fr;flex:1;overflow:hidden;height:calc(100vh - 58px);}
#phase-list{border-right:1px solid var(--border);overflow-y:auto;padding:20px 16px 20px 20px;display:flex;flex-direction:column;}
#detail-panel{background:var(--surface);overflow-y:auto;}

.phase-node{cursor:pointer;border:1.5px solid var(--border);border-radius:10px;background:var(--card);padding:14px 18px;transition:all .2s;display:grid;grid-template-columns:52px 1fr auto;gap:12px;align-items:center;}
.phase-node:hover{border-color:#444;}
.phase-node.active{background:var(--node-color-lt);border-color:var(--node-color);box-shadow:0 0 0 3px var(--node-color-sh);}
.phase-icon{text-align:center;}
.phase-num{font-size:9px;font-family:'DM Mono',monospace;letter-spacing:1px;margin-top:2px;}
.phase-label{font-size:14px;font-weight:700;font-family:'Syne',sans-serif;margin-bottom:3px;}
.phase-tagline{font-size:11px;color:var(--muted);}
.phase-right{text-align:right;}
.role-badge{border-radius:3px;font-size:9px;padding:3px 9px;font-family:'DM Mono',monospace;font-weight:500;letter-spacing:.5px;color:#fff;}
.phase-dur{font-size:10px;color:var(--faint);margin-top:4px;}

.connector{display:flex;justify-content:flex-start;padding-left:26px;margin:0;}
.connector-inner{display:flex;flex-direction:column;align-items:center;width:24px;}
.connector-line{width:1.5px;height:14px;background:var(--border);}
.connector-arrow{width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;}

/* ── DETAIL PANEL ── */
#detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--faint);gap:12px;padding:40px;text-align:center;}
#detail-empty .big-icon{font-size:36px;opacity:.3;font-family:monospace;}
#detail-content{padding:28px;height:100%;}
.detail-header{display:flex;gap:14px;align-items:center;margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid var(--border);}
.detail-phase-icon{font-size:36px;}
.detail-phase-num{font-size:8px;font-family:'DM Mono',monospace;letter-spacing:2px;font-weight:600;margin-bottom:6px;}
.detail-phase-name{font-size:20px;font-weight:800;font-family:'Syne',sans-serif;}
.detail-phase-tagline{font-size:12px;color:var(--muted);margin-top:3px;}
.detail-meta{display:flex;align-items:center;gap:10px;margin-bottom:6px;}

.section{margin-bottom:16px;}
.section-title{font-size:9px;font-weight:700;letter-spacing:1.5px;font-family:'DM Mono',monospace;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.section-bar{height:1px;width:12px;display:inline-block;}
.task-row{display:flex;gap:10px;margin-bottom:8px;}
.task-arrow{font-size:14px;flex-shrink:0;margin-top:1px;}
.task-text{font-size:12px;color:#ccc;line-height:1.6;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}

.tag{display:inline-block;border-radius:3px;font-size:9px;padding:2px 7px;font-family:'DM Mono',monospace;font-weight:500;white-space:nowrap;margin-bottom:5px;}
.tool-row{font-size:11px;color:var(--muted);margin-bottom:5px;display:flex;gap:6px;}
.tool-arrow{color:var(--faint);}

.note-box{border-radius:6px;padding:10px 14px;background:#1a1500;border-left:3px solid var(--amber);}
.note-label{font-size:9px;color:var(--amber);font-weight:700;letter-spacing:1px;font-family:'DM Mono',monospace;margin-bottom:5px;}
.note-text{font-size:11px;color:#ccc;line-height:1.6;font-style:italic;}

/* ── CI/CD BAR ── */
.cicd-bar{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:16px;}
.cicd-title{font-size:9px;color:var(--green);font-family:'DM Mono',monospace;font-weight:700;letter-spacing:1.5px;margin-bottom:12px;}
.cicd-steps{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.cicd-step{border-radius:7px;padding:7px 12px;text-align:center;min-width:90px;}
.cicd-step-icon{font-size:14px;margin-bottom:2px;}
.cicd-step-label{font-size:9px;font-weight:700;font-family:'DM Mono',monospace;}
.cicd-step-sub{font-size:8px;color:var(--faint);}
.cicd-sep{display:flex;align-items:center;}
.cicd-sep-line{width:16px;height:1.5px;background:var(--faint);}
.cicd-sep-arrow{width:0;height:0;border-top:4px solid transparent;border-bottom:4px solid transparent;}

/* ── TAB 1 SPRINT ── */
#sprint-view{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:20px;}
.week-labels{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.week-label{background:#161616;border:1px solid var(--border);border-radius:6px;padding:6px 14px;display:flex;align-items:center;gap:8px;}
.week-name{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
.week-days{font-size:10px;color:var(--faint);}
.sprint-cols{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;align-items:start;}
.sprint-col{border:1.5px solid var(--border);border-radius:10px;background:var(--card);overflow:hidden;cursor:pointer;transition:all .2s;}
.sprint-col:hover{border-color:#444;}
.sprint-col.active{box-shadow:0 0 0 2px rgba(255,255,255,.1);}
.sprint-col-head{padding:12px 14px;transition:background .2s;}
.sprint-col-icon{font-size:18px;margin-bottom:2px;}
.sprint-col-label{font-size:13px;font-weight:700;font-family:'Syne',sans-serif;}
.sprint-col-days{font-size:9px;margin-top:2px;}
.sprint-col-body{padding:12px 14px;}
.sprint-item{display:flex;gap:7px;margin-bottom:6px;}
.sprint-item-arrow{font-size:10px;flex-shrink:0;margin-top:1px;}
.sprint-item-text{font-size:10px;color:#bbb;line-height:1.5;}
.sprint-auto{border-top:1px solid var(--border);padding:7px 14px;}
.sprint-auto-text{font-size:8px;font-family:'DM Mono',monospace;letter-spacing:.5px;display:flex;gap:5px;align-items:flex-start;line-height:1.5;}

/* Sprint H-arrows between columns */
.sprint-arrows{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:-8px;margin-bottom:4px;}
.sprint-arrow-cell{height:16px;display:flex;justify-content:flex-end;align-items:center;padding-right:0;}

/* DoD */
.dod-tables{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:4px;}
.dod-table{border-radius:10px;overflow:hidden;}
.dod-head{padding:10px 16px;}
.dod-head-title{font-size:12px;font-weight:700;font-family:'Syne',sans-serif;}
.dod-head-sub{font-size:10px;color:var(--faint);margin-top:2px;}
.dod-row{display:grid;grid-template-columns:1fr auto;gap:12px;padding:8px 16px;align-items:center;border-bottom:1px solid var(--border);}
.dod-row:last-child{border-bottom:none;}
.dod-row.alt{background:rgba(20,20,20,.5);}
.dod-check{display:flex;gap:8px;align-items:center;}
.dod-check-mark{font-size:11px;flex-shrink:0;}
.dod-check-text{font-size:11px;color:#ccc;}

/* ── TAB 2 TECH ── */
#tech-view{flex:1;overflow:hidden;padding:24px 28px;height:calc(100vh - 58px);}
#tech-layout{display:grid;grid-template-columns:200px 1fr;gap:16px;height:100%;}
#tech-sidebar{display:flex;flex-direction:column;gap:4px;overflow-y:auto;}
.tech-item{cursor:pointer;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);transition:all .15s;}
.tech-item:hover{border-color:#444;}
.tech-item.active{border-color:var(--node-color);}
.tech-item-icon{font-size:16px;margin-bottom:4px;}
.tech-item-label{font-size:12px;font-weight:700;font-family:'Syne',sans-serif;line-height:1.3;}
.tech-note{margin-top:12px;padding:12px 14px;border-radius:8px;background:#1a1500;border:1px solid rgba(245,158,11,.2);}
.tech-note-label{font-size:9px;color:var(--amber);font-family:'DM Mono',monospace;font-weight:700;letter-spacing:1px;margin-bottom:6px;}
.tech-note-text{font-size:10px;color:var(--muted);line-height:1.6;}
#tech-code{border-radius:10px;overflow:hidden;border:1.5px solid var(--node-color-border);display:flex;flex-direction:column;height:100%;}
#tech-code-head{padding:12px 18px;display:flex;gap:10px;align-items:center;border-bottom:1px solid var(--node-color-border);}
#tech-code-icon{font-size:16px;}
#tech-code-title{font-size:13px;font-weight:700;font-family:'Syne',sans-serif;}
#tech-code-body{padding:18px 20px;overflow-y:auto;flex:1;background:#0d0d0d;font-family:'DM Mono',monospace;}
.code-line{font-size:11px;line-height:1.9;}
.code-line.header{font-weight:600;padding-top:8px;}
.code-line.empty{color:transparent;}
.code-line.normal{color:#d4d4d4;}

/* ── AUTOMATION FOOTER ── */
.auto-footer{margin-top:14px;padding:10px 14px;background:var(--black);border:1px solid var(--border);border-radius:8px;}
.auto-footer-title{font-size:8px;color:var(--green);font-family:'DM Mono',monospace;font-weight:700;letter-spacing:1.5px;margin-bottom:6px;}
.auto-item{font-size:10px;color:var(--faint);margin-bottom:3px;display:flex;gap:7px;}
.auto-item-icon{color:var(--green);}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div id="header-title">
    <div id="header-bar"></div>
    <div>
      <div id="header-main">Metodología de Desarrollo</div>
      <div id="header-sub">Del relevamiento a la entrega · Sprints de 2 semanas</div>
    </div>
  </div>
  <div id="tabs">
    <button class="tab-btn active" onclick="switchTab(0)">Flujo General</button>
    <button class="tab-btn" onclick="switchTab(1)">Sprint · 2 Semanas</button>
    <button class="tab-btn" onclick="switchTab(2)">Referencia Técnica</button>
  </div>
</div>

<div id="content">

  <!-- TAB 0: FLUJO GENERAL -->
  <div class="view active" id="view-0">
    <div id="general-layout">
      <div id="phase-list" id="phase-list"></div>
      <div id="detail-panel">
        <div id="detail-empty">
          <div class="big-icon">◎</div>
          <div style="font-size:13px;">Seleccioná una fase para ver el detalle completo</div>
        </div>
        <div id="detail-content" style="display:none;"></div>
      </div>
    </div>
  </div>

  <!-- TAB 1: SPRINT -->
  <div class="view" id="view-1">
    <div id="sprint-view"></div>
  </div>

  <!-- TAB 2: TECH -->
  <div class="view" id="view-2">
    <div id="tech-view">
      <div id="tech-layout">
        <div id="tech-sidebar"></div>
        <div id="tech-code">
          <div id="tech-code-head">
            <span id="tech-code-icon"></span>
            <span id="tech-code-title"></span>
          </div>
          <div id="tech-code-body"></div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>

// DATA
// ─────────────────────────────────────────

   auto:"CD Pipeline: deploy + docs + notificación Teams en merge a main"},

const CI_STEPS = [
  {icon:"💾",label:"git commit",sub:"pre-commit",color:"#86BC25"},
  {icon:"📤",label:"git push",sub:"branch",color:"#14b8a6"},

// ─────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────
function hex2rgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}
function tag(text, color) {
  return `<span class="tag" style="background:${hex2rgba(color,.15)};color:${color};border:1px solid ${hex2rgba(color,.35)}">${text}</span>`;
}
function roleBadge(role, color) {
  return `<span class="role-badge" style="background:${color}">${role}</span>`;
}

// ─────────────────────────────────────────
// TAB SWITCHING
// ─────────────────────────────────────────
let currentTab = 0;
function switchTab(n) {
  document.querySelectorAll('.view').forEach((v,i) => v.classList.toggle('active', i===n));
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===n));
  currentTab = n;
}

// ─────────────────────────────────────────
// TAB 0 — FLUJO GENERAL
// ─────────────────────────────────────────
let activePhase = null;

function renderPhaseList() {
  const list = document.getElementById('phase-list');
  list.innerHTML = '';
  PHASES.forEach((ph, i) => {
    const isAct = activePhase === ph.id;
    const node = document.createElement('div');
    node.className = 'phase-node fade-up' + (isAct ? ' active' : '');
    node.style.animationDelay = (i*60)+'ms';
    node.style.setProperty('--node-color', ph.color);
    node.style.setProperty('--node-color-lt', hex2rgba(ph.color,.08));
    node.style.setProperty('--node-color-sh', hex2rgba(ph.color,.18));
    if (isAct) {
      node.style.background = hex2rgba(ph.color,.08);
      node.style.borderColor = ph.color;
      node.style.boxShadow = `0 0 0 3px ${hex2rgba(ph.color,.18)}`;
    }
    node.innerHTML = `
      <div class="phase-icon">
        <div style="font-size:22px;color:${ph.color};font-family:monospace">${ph.icon}</div>
        <div class="phase-num" style="color:${ph.color}">${ph.num}</div>
      </div>
      <div>
        <div class="phase-label">${ph.label}</div>
        <div class="phase-tagline">${ph.tagline}</div>
      </div>
      <div class="phase-right">
        ${roleBadge(ph.role, ph.color)}
        <div class="phase-dur">⏱ ${ph.dur}</div>
      </div>`;
    node.onclick = () => { activePhase = isAct ? null : ph.id; renderPhaseList(); renderDetail(); };
    list.appendChild(node);

    if (i < PHASES.length - 1) {
      const conn = document.createElement('div');
      conn.className = 'connector';
      conn.innerHTML = `<div class="connector-inner">
        <div class="connector-line" style="background:${isAct ? ph.color : '#2a2a2a'};opacity:${isAct?'.8':'.5'}"></div>
        <div class="connector-arrow" style="border-top:6px solid ${isAct ? ph.color : '#2a2a2a'};opacity:${isAct?'.8':'.5'}"></div>
      </div>`;
      list.appendChild(conn);
    }
  });

  // Automation footer
  const footer = document.createElement('div');
  footer.className = 'auto-footer';
  footer.style.marginTop = '14px';
  footer.innerHTML = `<div class="auto-footer-title">AUTOMATIZACIONES TRANSVERSALES</div>
    ${["Linters + formato en cada commit","Tests + calidad en cada Pull Request","Docs generadas en push a main","Deploy automático en merge a main","Notificación Teams en eventos clave"]
      .map(t => `<div class="auto-item"><span class="auto-item-icon">⚡</span>${t}</div>`).join('')}`;
  list.appendChild(footer);
}

function renderDetail() {
  const empty = document.getElementById('detail-empty');
  const content = document.getElementById('detail-content');
  const ph = PHASES.find(p => p.id === activePhase);
  if (!ph) { empty.style.display='flex'; content.style.display='none'; return; }
  empty.style.display = 'none';
  content.style.display = 'block';
  content.className = 'slide-in';
  void content.offsetWidth; // reflow
  content.innerHTML = `
    <div class="detail-header">
      <div class="detail-phase-icon" style="color:${ph.color}">${ph.icon}</div>
      <div>
        <div class="detail-meta">
          <span class="detail-phase-num" style="color:${ph.color}">FASE ${ph.num}</span>
          ${roleBadge(ph.role, ph.color)}
          <span style="font-size:10px;color:#555">⏱ ${ph.dur}</span>
        </div>
        <div class="detail-phase-name">${ph.label}</div>
        <div class="detail-phase-tagline">${ph.tagline}</div>
      </div>
    </div>
    <div class="section">
      <div class="section-title" style="color:${ph.color}">
        <span class="section-bar" style="background:${ph.color}"></span>TAREAS
      </div>
      ${ph.tasks.map(t => `<div class="task-row"><span class="task-arrow" style="color:${ph.color}">▸</span><span class="task-text">${t}</span></div>`).join('')}
    </div>
    <div class="two-col">
      <div class="section">
        <div class="section-title" style="color:${ph.color}">
          <span class="section-bar" style="background:${ph.color}"></span>ARTEFACTOS
        </div>
        ${ph.artifacts.map(a => `<div>${tag(a, ph.color)}</div>`).join('')}
      </div>
      <div class="section">
        <div class="section-title" style="color:${ph.color}">
          <span class="section-bar" style="background:${ph.color}"></span>HERRAMIENTAS
        </div>
        ${ph.tools.map(t => `<div class="tool-row"><span class="tool-arrow">→</span>${t}</div>`).join('')}
      </div>
    </div>
    <div class="note-box" style="border-left-color:#f59e0b">
      <div class="note-label">NOTA PRÁCTICA</div>
      <div class="note-text">${ph.note}</div>
    </div>`;
}

// ─────────────────────────────────────────
// TAB 1 — SPRINT
// ─────────────────────────────────────────
function renderSprint() {
  const sv = document.getElementById('sprint-view');

  // CI/CD bar
  const cicd = document.createElement('div');
  cicd.className = 'cicd-bar';
  cicd.innerHTML = `<div class="cicd-title">FLUJO CI/CD — AUTOMÁTICO EN CADA ITERACIÓN DEL SPRINT</div>
    <div class="cicd-steps">
      ${CI_STEPS.map((s,i) => `
        <div class="cicd-step" style="background:${hex2rgba(s.color,.12)};border:1px solid ${hex2rgba(s.color,.35)}">
          <div class="cicd-step-icon">${s.icon}</div>
          <div class="cicd-step-label" style="color:${s.color}">${s.label}</div>
          <div class="cicd-step-sub">${s.sub}</div>
        </div>
        ${i < CI_STEPS.length-1 ? `<div class="cicd-sep">
          <div class="cicd-sep-line"></div>
          <div class="cicd-sep-arrow" style="border-left:5px solid #555;border-top:4px solid transparent;border-bottom:4px solid transparent"></div>
        </div>` : ''}
      `).join('')}
    </div>`;
  sv.appendChild(cicd);

  // Week labels
  const wl = document.createElement('div');
  wl.className = 'week-labels';
  wl.innerHTML = `
    <div class="week-label" style="grid-column:1/3"><span class="week-name">SEMANA 1</span><span class="week-days">Días 1–5</span></div>
    <div class="week-label" style="grid-column:3/6"><span class="week-name">SEMANA 2</span><span class="week-days">Días 6–10</span></div>`;
  sv.appendChild(wl);

  // Sprint cols
  const grid = document.createElement('div');
  grid.className = 'sprint-cols';

  SPRINT_COLS.forEach((col, i) => {
    const card = document.createElement('div');
    card.className = 'sprint-col fade-up';
    card.style.animationDelay = (i*60)+'ms';
    card.style.borderColor = hex2rgba(col.color, .35);
    card.innerHTML = `
      <div class="sprint-col-head" style="background:${hex2rgba(col.color,.2)}">
        <div class="sprint-col-icon" style="color:${col.color}">${col.icon}</div>
        <div class="sprint-col-label">${col.label}</div>
        <div class="sprint-col-days" style="color:#666">${col.days} · ${col.dow}</div>
      </div>
      <div class="sprint-col-body">
        ${col.items.map(item => `<div class="sprint-item">
          <span class="sprint-item-arrow" style="color:${col.color}">▸</span>
          <span class="sprint-item-text">${item}</span>
        </div>`).join('')}
      </div>
      ${col.auto ? `<div class="sprint-auto" style="background:${hex2rgba(col.color,.05)}">
        <div class="sprint-auto-text" style="color:${col.color}"><span>⚡</span><span>${col.auto}</span></div>
      </div>` : ''}`;
    grid.appendChild(card);
  });
  sv.appendChild(grid);

  // DoD
  const dod = document.createElement('div');
  dod.className = 'dod-tables';
  dod.innerHTML = `
    ${renderDod("Definition of Done — Por feature","El dev valida antes de abrir el PR",DOD_FEATURE,"#86BC25")}
    ${renderDod("Definition of Done — Por sprint","El QA valida antes del Sprint Review",DOD_SPRINT,"#3b82f6")}`;
  sv.appendChild(dod);
}

function renderDod(title, subtitle, items, color) {
  return `<div class="dod-table" style="border:1.5px solid ${hex2rgba(color,.35)}">
    <div class="dod-head" style="background:${hex2rgba(color,.12)};border-bottom:1px solid ${hex2rgba(color,.25)}">
      <div class="dod-head-title" style="color:${color}">${title}</div>
      <div class="dod-head-sub">${subtitle}</div>
    </div>
    ${items.map((item,i) => `<div class="dod-row ${i%2===1?'alt':''}">
      <div class="dod-check">
        <span class="dod-check-mark" style="color:${color}">✓</span>
        <span class="dod-check-text">${item.crit}</span>
      </div>
      ${tag(item.who, color)}
    </div>`).join('')}
  </div>`;
}

// ─────────────────────────────────────────
// TAB 2 — TECH REFERENCE
// ─────────────────────────────────────────
let activeTech = 0;

function renderTech() {
  const sidebar = document.getElementById('tech-sidebar');
  sidebar.innerHTML = '';
  TECH_CARDS.forEach((card, i) => {
    const item = document.createElement('div');
    item.className = 'tech-item' + (i===activeTech ? ' active' : '');
    item.style.setProperty('--node-color', card.color);
    if (i===activeTech) item.style.borderColor = card.color;
    item.innerHTML = `<div class="tech-item-icon" style="color:${card.color}">${card.icon}</div>
      <div class="tech-item-label" style="color:${i===activeTech ? card.color : '#fff'}">${card.title}</div>`;
    item.onclick = () => { activeTech = i; renderTech(); };
    sidebar.appendChild(item);
  });

  const noteBox = document.createElement('div');
  noteBox.className = 'tech-note';
  noteBox.innerHTML = `<div class="tech-note-label">NOTA</div>
    <div class="tech-note-text">PDD.md y SDD.md viven en el mismo repositorio, versionados junto al código. Cualquier cambio queda registrado con fecha y autor.</div>`;
  sidebar.appendChild(noteBox);

  const tc = TECH_CARDS[activeTech];
  const codeBox = document.getElementById('tech-code');
  codeBox.style.borderColor = hex2rgba(tc.color,.35);
  document.getElementById('tech-code-head').style.background = hex2rgba(tc.color,.12);
  document.getElementById('tech-code-head').style.borderBottom = `1px solid ${hex2rgba(tc.color,.25)}`;
  document.getElementById('tech-code-icon').textContent = tc.icon;
  document.getElementById('tech-code-icon').style.color = tc.color;
  document.getElementById('tech-code-title').textContent = tc.title;
  document.getElementById('tech-code-title').style.color = '#fff';

  const body = document.getElementById('tech-code-body');
  body.innerHTML = '';
  body.className = 'slide-in';
  tc.lines.forEach(line => {
    const div = document.createElement('div');
    const isHeader = line.startsWith('──');
    const isEmpty = line === '';
    div.className = 'code-line ' + (isHeader ? 'header' : isEmpty ? 'empty' : 'normal');
    if (isHeader) div.style.color = tc.color;
    div.textContent = isEmpty ? '\u00a0' : line;
    body.appendChild(div);
  });
}

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
renderPhaseList();
renderDetail();
renderSprint();
renderTech();
</script>
</body>
